# Prometheus + Grafana Stack Configuration
# Installed via Helm: kube-prometheus-stack
# helm install prometheus prometheus-community/kube-prometheus-stack \
#   --namespace monitoring \
#   --values monitoring/prometheus-values.yaml

grafana:
  adminPassword: admin123
  service:
    type: ClusterIP
    port: 80

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 15d
    resources:
      requests:
        memory: "400Mi"
        cpu: "100m"
      limits:
        memory: "800Mi"
        cpu: "500m"

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: "100Mi"
        cpu: "50m"

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
